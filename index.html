<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
        integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="styles.css">
    <title>Welcome to ShotNote</title>
</head>

<body>
    <div class="container">
        <div class="paragraph-box">
            <p id="paragraph"></p>
            <div class="button-container">
                <button onclick="showLanguage('english')">English</button>
                <button onclick="showLanguage('japanese')">Japanese</button>
            </div>
        </div>
    </div>

    <nav aria-label="Page navigation example">
        <ul class="pagination">
            <li class="page-item" id="prevBtn">
                <button class="page-link" aria-label="Previous" onclick="prevParagraph()">
                    <span aria-hidden="true">&laquo;</span>
                    <span class="sr-only">Previous</span>
                </button>
            </li>
            <li class="page-item" id="nextBtn">
                <button class="page-link" aria-label="Next" onclick="nextParagraph()">
                    <span aria-hidden="true">&raquo;</span>
                    <span class="sr-only">Next</span>
                </button>
            </li>
        </ul>
    </nav>

    <script src="script.js"></script>
</body>

</html>
